name: 股票日报

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 23 * * *'   # 北京时间 7:30（对应 UTC 23:00）

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: 安装依赖
        run: pip install -r requirements.txt
      - name: 运行脚本
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          WORKBUDDY_API_KEY: ${{ secrets.WORKBUDDY_API_KEY }}
        run: python main.py
